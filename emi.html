<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator</title>
<style>
body{
font-family:Arial;
align-items: center;
background:#111827;
color:white;
padding:50px;
}

.container{
max-width:500px;
margin: 20px auto;
background:#1e2e45;
padding:50px;
border-radius: 25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:50%;
align-items: center;
padding: 15px;
background:#d4b800;
border:none;
display: block;
margin: 20px auto;
color:white;
border-radius:80px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
}

.bank{
margin-top:30px;
background:#374151;
padding:15px;
border-radius:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>EMI Calculator</h1>
<input type="number" id="amount" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate">
<input type="number" id="years" placeholder="Years">
<button onclick="calculateEMI()">
Calculate EMI
</button>
<div class="result" id="result"></div>
<div class="bank">
<h3>Bank Interest Rates</h3>
<p>SBI → 8.5%</p>
<p>HDFC → 9%</p>
<p>ICICI → 8.7%</p>
</div>
</div>
<script>
function calculateEMI(){
let P =
document.getElementById("amount").value;
let annualRate =
document.getElementById("rate").value;
let years =
document.getElementById("years").value;
let R = annualRate / 12 / 100;
let N = years * 12;
let EMI =
(P * R * Math.pow(1 + R, N)) /
(Math.pow(1 + R, N) - 1);
document.getElementById("result")
.innerHTML =
`Monthly EMI = ₹${EMI.toFixed(2)}`;
}
</script>
</body>
</html>
