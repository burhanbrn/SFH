<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART FINANCIAL HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form id="signupForm">
                <h1>Create Account</h1>
                <span> Or use your email for register</span>
                <input type="text" id="signupName" placeholder="Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Passsword">
                <button type="submit">Sign Up</button>
            </form>
        </div>

         <div class="form-container sign-in">
            <form id="signinForm">
                <h1>Sign In</h1>
                <span>Enter your credentials</span>
                <input type="email" id="signinEmail" placeholder="Email" required>
                <input type="password" id="signinPassword" placeholder="Passsword" required>
                <a href="#">Forgot Password?</a>
                <button type="submit" id="signinBtn">Sign In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back to SFH</h1>
                    <p>Enter your personal to use the site</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello from SFH</h1>
                    <p>Register your details to explore the financial hub</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
<script src="hub.js"></script>
</body>
</html>
